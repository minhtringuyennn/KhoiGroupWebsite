name: "DeepLEAD Research Group"
short_name: "DeepLEAD"
tagline: "Deep Models, Learning, and Adaptation"
description: |
  We are a research group at the National University of Singapore's Department of Mathematics,
  led by Dr. Tan Minh Nguyen. Our research focuses on three important components of modern AI:
  Deep Models, Learning, and Adaptation (DeepLEAD).

  We leverage tools from machine learning, optimization, differential equations, statistics,
  and algebra to understand and advance these three components, aiming to achieve Robust,
  Interpretable, Scalable, and Efficient AI (RISE AI).
pi_name: "Dr. Tan Minh Nguyen"
