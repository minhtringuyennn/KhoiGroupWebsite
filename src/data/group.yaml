name: "Machine Learning & Robotics Lab"
short_name: "MLR Lab"
tagline: "Advancing the Frontiers of Embodied Intelligence"
description: |
  We are a research group at Carnegie Mellon University's School of Computer Science,
  working at the intersection of machine learning, computer vision, and robotics.
  Our mission is to develop intelligent systems that can perceive, reason, and act
  in the physical world.

  Our lab combines theoretical foundations with practical applications, collaborating
  closely with industry and other academic groups to tackle fundamental challenges
  in embodied AI.
pi_name: "Dr. Jane Smith"
