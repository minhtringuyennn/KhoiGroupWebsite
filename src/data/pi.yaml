bio:
  - "Dr. Jane Smith is an Assistant Professor in the School of Computer Science at Carnegie Mellon University. She leads the Machine Learning & Robotics Lab, which focuses on building intelligent systems that can perceive, reason, and act in the physical world."
  - "Her research lies at the intersection of machine learning, computer vision, and robotics. She develops neural representations for 3D scenes, dexterous robot manipulation policies, and embodied AI agents that follow natural language instructions."
  - "Before joining CMU, she was a postdoctoral researcher at MIT CSAIL. She received her Ph.D. in Computer Science from Stanford University."

