bio:
  - "I am currently an Assistant Professor of Mathematics (Presidential Young Professor) at the National University of Singapore (NUS). Before joining NUS, I was a postdoctoral scholar in the Department of Mathematics at the University of California, Los Angeles, working with Dr. Stanley J. Osher. I obtained my Ph.D. in Machine Learning from Rice University, where I was advised by Dr. Richard G. Baraniuk."
  - "I gave an invited talk in the Deep Learning Theory Workshop at NeurIPS 2018 and organized the 1st Workshop on Integration of Deep Neural Models and Differential Equations at ICLR 2020. I also had two awesome long internships with Amazon AI and NVIDIA Research, during which I worked with Dr. Anima Anandkumar."
  - "I am the recipient of the prestigious Computing Innovation Postdoctoral Fellowship (CIFellows) from the Computing Research Association (CRA), the NSF Graduate Research Fellowship, and the IGERT Neuroengineering Traineeship. I received my M.S. and B.S. in Electrical and Computer Engineering from Rice in May 2018 and May 2014, respectively."
  - "I am also writing about simple ideas and principled approaches that lead to working machine learning algorithms on my blog, Almost Convergent."
  - "My research focuses on 3 important components of modern AI: Deep Models, Learning, and Adaptation (DeepLEAD). We leverage tools from machine learning, optimization, differential equations, statistics, and algebra to understand and advance these three components, aiming to achieve Robust, Interpretable, Scalable, and Efficient AI (RISE AI)."

